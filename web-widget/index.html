<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>CDM 2026 Live</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="widget" aria-labelledby="widget-title">
      <div class="pitch-lines" aria-hidden="true"></div>
      <header class="widget__header">
        <div class="brand" aria-hidden="true">
          <img src="./logo-cdm2026.png" alt="" width="42" height="42">
        </div>
        <div class="widget__heading">
          <h1 id="widget-title">CDM 2026 Live</h1>
          <p id="refresh-rate">Actualisation toutes les 15 s</p>
        </div>
        <div class="widget__tools">
          <button class="icon-button" id="refresh-button" type="button" title="Actualiser" aria-label="Actualiser les résultats">
            <span aria-hidden="true">↻</span>
          </button>
          <button class="icon-button" id="collapse-button" type="button" title="Réduire" aria-label="Réduire le widget" aria-controls="widget-body" aria-expanded="true">
            <span aria-hidden="true">−</span>
          </button>
        </div>
      </header>

      <div id="widget-body">
        <section class="team-strip" aria-labelledby="team-strip-title">
          <div class="team-strip__heading">
            <h2 id="team-strip-title">Équipes à suivre</h2>
            <span>Live · aujourd'hui · prochains matchs</span>
          </div>
          <div class="team-strip__track" id="tracked-teams" role="list" aria-live="polite">
            <span class="team-strip__loading">Chargement...</span>
          </div>
        </section>

        <nav class="tabs" role="tablist" aria-label="Période des matchs">
          <button class="tab" id="tab-live" type="button" role="tab" aria-selected="true" aria-controls="matches-panel" data-view="live">Live</button>
          <button class="tab" id="tab-today" type="button" role="tab" aria-selected="false" aria-controls="matches-panel" data-view="today" tabindex="-1">Aujourd'hui</button>
          <button class="tab" id="tab-upcoming" type="button" role="tab" aria-selected="false" aria-controls="matches-panel" data-view="upcoming" tabindex="-1">À venir</button>
        </nav>

        <section class="matches" id="matches-panel" role="tabpanel" aria-labelledby="tab-live" tabindex="0">
          <div class="state" id="state-message" role="status" aria-live="polite">
            <span class="spinner" aria-hidden="true"></span>
            <p>Chargement des matchs...</p>
          </div>
          <div id="matches-list" hidden></div>
        </section>

        <footer class="widget__footer">
          <dl class="metadata">
            <div><dt>Source</dt><dd id="source-value">—</dd></div>
            <div><dt>Dernière mise à jour</dt><dd id="updated-value">—</dd></div>
          </dl>
        </footer>
      </div>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
